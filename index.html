<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verytel Rutas v3</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap');
:root{--bg:#0d0f14;--surface:#161923;--surface2:#1e2535;--border:#2a3348;--accent:#00d4aa;--text:#e2e8f0;--text2:#94a3b8;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);display:flex;flex-direction:column;}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:9px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:32px;height:32px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:17px;}
.logo-text{font-size:14px;font-weight:700;}
.logo-sub{font-size:10px;font-family:var(--mono);color:var(--accent);}
.hstats{display:flex;gap:18px;}
.hstat{text-align:center;}
.hv{font-family:var(--mono);font-size:18px;font-weight:600;color:var(--accent);line-height:1;}
.hl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;}
.main{display:flex;flex:1;min-height:0;}
.panel-left{width:330px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.psec{padding:11px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.ptitle{font-size:10px;font-family:var(--mono);text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin-bottom:7px;}
.sinput{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:7px 11px;color:var(--text);font-family:var(--sans);font-size:12px;outline:none;}
.sinput:focus{border-color:var(--accent);}
.sinput::placeholder{color:var(--text2);}
.loc-sel{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:6px 11px;color:var(--text);font-family:var(--sans);font-size:12px;outline:none;margin-top:5px;cursor:pointer;}
.loc-sel option{background:var(--surface2);}
.smeta{font-size:11px;color:var(--text2);margin-top:4px;font-family:var(--mono);}
.qrow{display:flex;gap:5px;}
.qb{flex:1;padding:5px 0;border-radius:4px;background:var(--surface2);border:1px solid var(--border);color:var(--text2);font-size:10px;font-family:var(--mono);cursor:pointer;text-align:center;transition:all .15s;}
.qb:hover{background:var(--accent);color:#000;border-color:var(--accent);}
.bodega-info{display:flex;align-items:center;gap:6px;font-size:11px;font-family:var(--mono);color:var(--text2);}
.bdot{width:10px;height:10px;border-radius:50%;background:#fff;border:2px solid #555;flex-shrink:0;}
.site-list{flex:1;overflow-y:auto;min-height:0;}
.site-list::-webkit-scrollbar{width:3px;}
.site-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.si{display:flex;align-items:center;padding:7px 14px;cursor:pointer;transition:background .1s;gap:9px;}
.si:hover{background:var(--surface2);}
.scb{width:15px;height:15px;border-radius:3px;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;}
.sinfo{flex:1;min-width:0;}
.sname{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.smeta2{font-size:10px;color:var(--text2);font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.cbadge{background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:1px 5px;font-size:10px;font-family:var(--mono);color:var(--text2);flex-shrink:0;}
#map{flex:1;z-index:1;}
.panel-right{width:370px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;}
.ttabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.ttab{flex:1;padding:9px 4px 7px;text-align:center;cursor:pointer;font-size:11px;font-family:var(--mono);font-weight:700;border-bottom:3px solid transparent;transition:all .15s;color:var(--text2);}
.ttab:hover{background:var(--surface2);}
.tcnt{font-size:9px;opacity:.8;display:block;line-height:1;margin-top:2px;}
.tech-hdr{padding:9px 13px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:9px;flex-shrink:0;}
.tdot{width:11px;height:11px;border-radius:50%;flex-shrink:0;}
.tname-in{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:6px 10px;color:var(--text);font-family:var(--sans);font-size:12px;outline:none;}
.tname-in:focus{border-color:var(--accent);}
.tname-in::placeholder{color:var(--text2);}
.optbadge{background:rgba(0,212,170,.12);border:1px solid var(--accent);border-radius:3px;padding:1px 6px;font-size:10px;font-family:var(--mono);color:var(--accent);white-space:nowrap;}
.rstats{padding:8px 13px;background:var(--surface2);border-bottom:1px solid var(--border);display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;flex-shrink:0;}
.rst{text-align:center;}
.rsv{font-family:var(--mono);font-size:15px;font-weight:600;line-height:1;}
.rsl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;}
.route-list{flex:1;overflow-y:auto;min-height:0;}
.route-list::-webkit-scrollbar{width:3px;}
.route-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.ri{display:flex;align-items:center;padding:9px 12px;border-bottom:1px solid var(--border);gap:9px;transition:background .1s;}
.ri:hover{background:var(--surface2);}
.ri.drag-over{border-top:2px solid var(--accent);background:rgba(0,212,170,.05);}
.ri.dragging{opacity:.3;}
.dh{color:var(--text2);font-size:16px;cursor:grab;flex-shrink:0;line-height:1;padding:0 2px;}
.dh:active{cursor:grabbing;}
.rnum{width:24px;height:24px;border-radius:50%;font-size:10px;font-weight:700;font-family:var(--mono);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.rinfo{flex:1;min-width:0;}
.rname{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.raddr{font-size:10px;color:var(--text2);font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.rrm{background:none;border:none;color:var(--text2);cursor:pointer;font-size:13px;padding:3px 5px;border-radius:3px;transition:all .15s;flex-shrink:0;}
.rrm:hover{color:#ef4444;background:rgba(239,68,68,.1);}
.empty-r{padding:30px 18px;text-align:center;color:var(--text2);}
.empty-icon{font-size:26px;margin-bottom:8px;opacity:.4;}
.empty-txt{font-size:12px;line-height:1.6;}
.actions{padding:9px 12px;display:flex;flex-direction:column;gap:6px;border-top:1px solid var(--border);flex-shrink:0;}
.btn{padding:8px 12px;border-radius:5px;font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px;}
.btn:disabled{opacity:.3;cursor:not-allowed;}
.btn-g{background:var(--accent);color:#000;}
.btn-g:hover:not(:disabled){background:#00bfa0;}
.btn-b{background:#3b82f6;color:#fff;}
.btn-b:hover:not(:disabled){background:#2563eb;}
.btn-s{background:var(--surface2);color:var(--text);border:1px solid var(--border);}
.btn-s:hover:not(:disabled){background:var(--border);}
.btn-d{background:rgba(239,68,68,.1);color:#ef4444;border:1px solid rgba(239,68,68,.25);}
.btn-d:hover:not(:disabled){background:rgba(239,68,68,.2);}
.brow{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.notif{position:fixed;bottom:20px;right:20px;background:var(--surface2);border:1px solid var(--accent);border-radius:7px;padding:9px 16px;font-size:12px;color:var(--text);z-index:9999;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;font-family:var(--mono);max-width:280px;}
.notif.show{opacity:1;transform:translateY(0);}
</style>
</head>

function allAssigned(){const s=new Set();techs.forEach(t=>t.route.forEach(id=>s.add(id)));return s;}
function whoHas(id){return techs.findIndex(t=>t.route.includes(id));}
function dist(a,b,c,d){
  const R=6371,dL=(c-a)*Math.PI/180,dN=(d-b)*Math.PI/180;
  const x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dN/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function calcKm(route){
  const ss=route.map(id=>SITES.find(s=>s.id===id)).filter(Boolean);
  if(!ss.length) return '0.0';
  let km=dist(BODEGA.lat,BODEGA.lng,ss[0].lat,ss[0].lng);
  for(let i=0;i<ss.length-1;i++) km+=dist(ss[i].lat,ss[i].lng,ss[i+1].lat,ss[i+1].lng);
  km+=dist(ss[ss.length-1].lat,ss[ss.length-1].lng,BODEGA.lat,BODEGA.lng);
  return km.toFixed(1);
}

function toggleSite(id){
  const ti=whoHas(id);
  if(ti===active){
    techs[active].route=techs[active].route.filter(x=>x!==id);
    techs[active].opt=false;
  }else if(ti!==-1){
    techs[ti].route=techs[ti].route.filter(x=>x!==id);
    techs[ti].opt=false;
    techs[active].route.push(id);
    techs[active].opt=false;
  }else{
    techs[active].route.push(id);
    techs[active].opt=false;
  }
  renderAll();
}

// DRAG & DROP ROUTE LIST
let dragIdx=null;
function renderRouteList(){
  const el=document.getElementById('routeList');
  const route=techs[active].route;
  const c=TC[active];
  const dark=c==='#00d4aa'||c==='#f59e0b';
  if(!route.length){
    el.innerHTML='<div class="empty-r"><div class="empty-icon">&#128203;</div><div class="empty-txt">Selecciona sitios de la lista<br>para armar la ruta</div></div>';
    return;
  }
  el.innerHTML='';
  route.forEach((id,i)=>{
    const s=SITES.find(x=>x.id===id); if(!s) return;
    const row=document.createElement('div');
    row.className='ri';
    row.dataset.idx=i;
    row.draggable=true;
    row.innerHTML='<span class="dh" title="Arrastra para reordenar">&#8942;</span>'
      +'<div class="rnum" style="background:'+c+';color:'+(dark?'#000':'#fff')+'">'+(i+1)+'</div>'
      +'<div class="rinfo"><div class="rname" title="'+s.name+'">'+s.name+'</div>'
      +'<div class="raddr">'+s.address+' · '+s.localidad_name+'</div></div>'
      +'<button class="rrm" onclick="removeStop('+id+')" title="Quitar">✕</button>';
    row.addEventListener('dragstart',e=>{
      dragIdx=i;row.classList.add('dragging');
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain',String(i));
    });
    row.addEventListener('dragend',()=>{
      row.classList.remove('dragging');
      el.querySelectorAll('.drag-over').forEach(r=>r.classList.remove('drag-over'));
      dragIdx=null;
    });
    row.addEventListener('dragover',e=>{
      e.preventDefault();
      el.querySelectorAll('.drag-over').forEach(r=>r.classList.remove('drag-over'));
      row.classList.add('drag-over');
    });
    row.addEventListener('dragleave',()=>row.classList.remove('drag-over'));
    row.addEventListener('drop',e=>{
      e.preventDefault();
      row.classList.remove('drag-over');
      const from=dragIdx,to=parseInt(row.dataset.idx);
      if(from===null||from===to) return;
      const r=techs[active].route;
      const [moved]=r.splice(from,1);
      r.splice(to,0,moved);
      techs[active].opt=false;
      dragIdx=null;
      renderAll();
    });
    el.appendChild(row);
  });
}

function removeStop(id){
  techs[active].route=techs[active].route.filter(x=>x!==id);
  techs[active].opt=false;renderAll();

function clearRoute(){
  techs[active].route=[];techs[active].opt=false;

// OPTIMIZE
function optimizeRoute(){
  const route=techs[active].route;
  if(route.length<2) return;
  const ss=route.map(id=>SITES.find(s=>s.id===id)).filter(Boolean);
  const n=ss.length,vis=new Array(n).fill(false),res=[];
  let cur=ss.reduce((b,s,i)=>{const d=dist(BODEGA.lat,BODEGA.lng,s.lat,s.lng);return d<b.d?{d,i}:b;},{d:Infinity,i:0}).i;
  for(let step=0;step<n;step++){
    vis[cur]=true;res.push(ss[cur].id);
    let near=-1,nd=Infinity;
    for(let j=0;j<n;j++){if(!vis[j]){const d=dist(ss[cur].lat,ss[cur].lng,ss[j].lat,ss[j].lng);if(d<nd){nd=d;near=j;}}}
    if(near!==-1) cur=near;
  }
  techs[active].route=res;techs[active].opt=true;
  renderAll();notify('⚡ T'+(active+1)+' optimizado — '+n+' paradas');
}

}

// EXCEL — clean values to avoid indexOf errors
function cleanVal(v){
  if(v===null||v===undefined) return '';
  if(typeof v==='number') return v;
  return String(v);
}
function cleanRow(row){ return row.map(cleanVal); }
function cleanRows(rows){ return rows.map(cleanRow); }

function buildRows(ti){
  const t=techs[ti];
  const nom=t.name||('Tecnico '+(ti+1));
  const d=new Date();
  const fecha=d.getDate().toString().padStart(2,'0')+'/'+(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getFullYear();
  const cams=t.route.reduce((a,id)=>{const s=SITES.find(x=>x.id===id);return a+(s?s.cameras:0);},0);
  const rows=[
    ['RUTA DE MANTENIMIENTO - GRUPO VERYTEL'],
    [''],
    ['Tecnico:', nom],
    ['Fecha:', fecha],
    ['Paradas:', t.route.length],
    ['Camaras:', cams],
    ['Km estimados:', t.route.length?Number(calcKm(t.route)):0],
    ['Optimizada:', t.opt?'Si':'No'],
    [''],
    ['Origen/Destino:', 'Bodega Verytel - Cra. 97 #24c-21'],
    [''],
    ['#','Nombre','Serial','Ref','Direccion','Localidad','IP XTAM','IP Router','Telefono','Marca','Camaras','Observaciones']
  ];
  t.route.forEach((id,i)=>{
    const s=SITES.find(x=>x.id===id); if(!s) return;
    rows.push([
      i+1,
      String(s.name||''),
      String(s.serial||''),
      String(s.ref||''),
      String(s.address||''),
      String(s.localidad_name||''),
      String(s.ip||''),
      String(s.ip_router||''),
      String(s.phone||''),
      String(s.brand||''),
      Number(s.cameras)||0,
      String(s.notes||'')
    ]);
  });
  return cleanRows(rows);
}

function exportExcel(){
  try{
    const wb=XLSX.utils.book_new();
    const ws=XLSX.utils.aoa_to_sheet(buildRows(active));
    ws['!cols']=[{wch:4},{wch:42},{wch:12},{wch:10},{wch:28},{wch:16},{wch:14},{wch:16},{wch:13},{wch:10},{wch:8},{wch:50}];
    XLSX.utils.book_append_sheet(wb,ws,'Ruta');
    const lnks=[['#','Nombre','Direccion','Localidad','Google Maps']];
    techs[active].route.forEach((id,i)=>{
      const s=SITES.find(x=>x.id===id);
      if(s) lnks.push([i+1,String(s.name||''),String(s.address||''),String(s.localidad_name||''),'https://maps.google.com/?q='+s.lat+','+s.lng]);
    });
    const ws2=XLSX.utils.aoa_to_sheet(lnks);
    ws2['!cols']=[{wch:4},{wch:42},{wch:28},{wch:16},{wch:55}];
    XLSX.utils.book_append_sheet(wb,ws2,'Links');

function getDate(){
  const d=new Date();
  return d.getDate().toString().padStart(2,'0')+'/'+(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getFullYear();
}
function getDateFile(){
  const d=new Date();
  return d.getDate().toString().padStart(2,'0')+'-'+(d.getMonth()+1).toString().padStart(2,'0')+'-'+d.getFullYear();
}
function sv(v){ return (v===null||v===undefined)?'':String(v); }

// Header row style — dark navy matching template
const HDR_FILL = {patternType:'solid', fgColor:{rgb:'1F3864'}};
const HDR_FONT = {name:'Calibri', sz:10, color:{rgb:'FFFFFF'}, bold:false};
const HDR_ALIGN = {horizontal:'center', vertical:'center', wrapText:true};
const TITLE_FONT = {name:'Calibri', sz:12, color:{rgb:'FFFFFF'}, bold:false};
const DATA_FONT = {name:'Calibri', sz:10};
const THIN = {style:'thin', color:{rgb:'CCCCCC'}};
const BORDER = {top:THIN, bottom:THIN, left:THIN, right:THIN};

function styleCell(cell, opts){
  if(!cell) return;
  if(opts.fill) cell.s = Object.assign(cell.s||{}, {fill:opts.fill});
  if(opts.font) cell.s = Object.assign(cell.s||{}, {font:opts.font});
  if(opts.align) cell.s = Object.assign(cell.s||{}, {alignment:opts.align});
  if(opts.border) cell.s = Object.assign(cell.s||{}, {border:opts.border});
  cell.s = cell.s||{};
  if(opts.fill) cell.s.fill = opts.fill;
  if(opts.font) cell.s.font = opts.font;
  if(opts.align) cell.s.alignment = opts.align;
  if(opts.border) cell.s.border = opts.border;
}

function makeHeaderRow(){ 
  return ['Ticket','Nombre completo','Dirección','Localidad','Novedad','XTAM VERSION','IP XTAM','OBSERVACIONES DE SITIO','Tecnicos','Estado','ACTA','Observaciones'];
}

// Build one sheet per tech — matching template structure exactly
// Each tech group: Title row (A:I merged) | Header row | Data rows
function buildTechSheet(ti){
  const t = techs[ti];
  const nom = t.name || ('Tecnico '+(ti+1));
  const fecha = getDate();

  const aoa = []; // array of arrays
  const merges = [];
  const styles = {}; // cell address -> style

  // ── Title row (row 0)
  const titleRow = new Array(12).fill('');
  titleRow[0] = 'Ruta de Mantenimiento '+fecha;
  aoa.push(titleRow);
  merges.push({s:{r:0,c:0}, e:{r:0,c:8}}); // A1:I1

  // ── Header row (row 1)
  aoa.push(makeHeaderRow());

  // ── Data rows per technician — in template each tech has its own header block
  // Since we export ONE sheet per tech, all rows belong to same tech
  t.route.forEach((id, i) => {
    const s = SITES.find(x=>x.id===id); if(!s) return;
    aoa.push([
      '',
      sv(s.name),
      sv(s.address),
      sv(s.localidad_name),
      'MANTENIMIENTO PREDICTIVO',
      sv(s.serial),
      sv(s.ip_xtam),
      sv(s.notes),
      nom,
      sv(s.estado),
      '',
      'https://maps.google.com/?q='+s.lat+','+s.lng
    ]);
  });

  return {aoa, merges};
}

// Build "all techs" sheet — one sheet with groups separated by tech headers (like template)
function buildAllSheet(){
  const fecha = getDate();
  const aoa = [];
  const merges = [];
  let row = 0;

  // Big title
  const bigTitle = new Array(12).fill('');
  bigTitle[0] = 'Ruta de Mantenimiento '+fecha;
  aoa.push(bigTitle);
  merges.push({s:{r:row,c:0}, e:{r:row,c:11}});
  row++;

  techs.forEach((t, ti) => {
    if(!t.route.length) return;
    const nom = t.name || ('Tecnico '+(ti+1));

    // Tech sub-header row (matching template: repeating header per tech)
    aoa.push(makeHeaderRow());
    merges.push({s:{r:row,c:0}, e:{r:row,c:0}}); // no merge, just style marker
    row++;

    t.route.forEach((id, i) => {
      const s = SITES.find(x=>x.id===id); if(!s) return;
      aoa.push([
        '',
        sv(s.name),
        sv(s.address),
        sv(s.localidad_name),
        'MANTENIMIENTO PREDICTIVO',
        sv(s.serial),
        sv(s.ip_xtam),
        sv(s.notes),
        nom,
        sv(s.estado),
        '',
        'https://maps.google.com/?q='+s.lat+','+s.lng
      ]);
      row++;
    });
  });

  return {aoa, merges};
}

// Build summary sheet
function buildSummary(){
  const fecha = getDate();
  const aoa = [
    ['RESUMEN RUTAS - GRUPO VERYTEL'],
    [''],
    ['Fecha:', fecha],
    [''],
    ['Tecnico','Nombre','Paradas','Camaras','Km Estimados']
  ];
  techs.forEach((t,i)=>{
    const cams=t.route.reduce((a,id)=>{const s=SITES.find(x=>x.id===id);return a+(s?s.cameras:0);},0);
    aoa.push(['T'+(i+1), sv(t.name)||'Sin nombre', t.route.length, cams, t.route.length?Number(calcKm(t.route)):0]);
  });
  return aoa;
}

function applySheetStyles(ws, aoa, merges){
  // Apply merges
  if(merges.length) ws['!merges'] = merges;

  // Column widths matching template
  ws['!cols'] = [{wch:8},{wch:44},{wch:20},{wch:14},{wch:26},{wch:13},{wch:15},{wch:45},{wch:17},{wch:13},{wch:6},{wch:55}];

  // Style each cell
  aoa.forEach((row, ri) => {
    row.forEach((val, ci) => {
      const addr = XLSX.utils.encode_cell({r:ri, c:ci});
      if(!ws[addr]) ws[addr] = {v:'', t:'s'};
      
      const isTitle = (ri===0);
      const isHeader = !isTitle && (val !== undefined) && makeHeaderRow().includes(val) && ci < 12 && row.join('')===makeHeaderRow().join('');
      
      ws[addr].s = {};

      if(isTitle){
        ws[addr].s.fill = {patternType:'solid', fgColor:{rgb:'1F3864'}};
        ws[addr].s.font = {name:'Calibri', sz:12, color:{rgb:'FFFFFF'}};
        ws[addr].s.alignment = {horizontal:'center', vertical:'center'};
      } else if(isHeader){
        ws[addr].s.fill = {patternType:'solid', fgColor:{rgb:'1F3864'}};
        ws[addr].s.font = {name:'Calibri', sz:10, color:{rgb:'FFFFFF'}};
        ws[addr].s.alignment = {horizontal:'center', vertical:'center', wrapText:true};
      } else {
        ws[addr].s.font = {name:'Calibri', sz:10};
        ws[addr].s.alignment = {vertical:'center', wrapText:(ci===7)};
        ws[addr].s.border = {top:{style:'thin',color:{rgb:'CCCCCC'}}, bottom:{style:'thin',color:{rgb:'CCCCCC'}}, left:{style:'thin',color:{rgb:'CCCCCC'}}, right:{style:'thin',color:{rgb:'CCCCCC'}}};
        // Observations column highlight if has content
        if(ci===7 && val && String(val).length > 0){
          ws[addr].s.fill = {patternType:'solid', fgColor:{rgb:'FFD966'}};
        }
      }
    });
  });

  // Row heights
  ws['!rows'] = aoa.map((row, ri) => {
    if(ri===0) return {hpt:18};
    const isHeader = makeHeaderRow().join('')===row.join('');
    return isHeader ? {hpt:28} : {hpt:25};
  });
}
